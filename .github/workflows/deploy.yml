name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, MSK-ACCESS-Prototype ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering branch (for React source)
        uses: actions/checkout@v4

      - name: Checkout main (source of truth for static content)
        uses: actions/checkout@v4
        with:
          ref: main
          path: _main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MSK-ACCESS/package-lock.json

      - name: Install dependencies
        if: hashFiles('MSK-ACCESS/package-lock.json') != ''
        run: cd MSK-ACCESS && npm install

      - name: Build React app
        if: hashFiles('MSK-ACCESS/package-lock.json') != ''
        run: cd MSK-ACCESS && npm run build

      - name: Assemble deployment folder
        run: |
          mkdir -p _deploy/MSK-ACCESS
          # Always copy static content from main
          cp -r _main/dynamic-header _deploy/ 2>/dev/null || true
          cp -r _main/vision _deploy/ 2>/dev/null || true
          cp -r _main/user-research _deploy/ 2>/dev/null || true
          cp -r _main/care_plan _deploy/ 2>/dev/null || true
          cp -r _main/design-system _deploy/ 2>/dev/null || true
          cp -r _main/telehealth _deploy/ 2>/dev/null || true
          cp _main/*.html _deploy/ 2>/dev/null || true
          # Copy built React app (only present when triggered from MSK-ACCESS-Prototype)
          cp -r MSK-ACCESS/dist/. _deploy/MSK-ACCESS/ 2>/dev/null || true

      - name: Generate index from projects.json
        run: cd _main && node scripts/generate-index.js > ../_deploy/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
