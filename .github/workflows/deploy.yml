name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, MSK-ACCESS-Prototype ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MSK-ACCESS/package-lock.json

      - name: Install dependencies
        if: hashFiles('MSK-ACCESS/package-lock.json') != ''
        run: cd MSK-ACCESS && npm install

      - name: Build React app
        if: hashFiles('MSK-ACCESS/package-lock.json') != ''
        run: cd MSK-ACCESS && npm run build

      - name: Assemble deployment folder
        run: |
          mkdir -p _deploy/MSK-ACCESS
          # Copy static content
          cp -r dynamic-header _deploy/ 2>/dev/null || true
          cp -r vision _deploy/ 2>/dev/null || true
          cp -r user-research _deploy/ 2>/dev/null || true
          cp -r care_plan _deploy/ 2>/dev/null || true
          cp -r design-system _deploy/ 2>/dev/null || true
          cp -r telehealth _deploy/ 2>/dev/null || true
          # Copy any root HTML files
          cp *.html _deploy/ 2>/dev/null || true
          # Copy built React app into MSK-ACCESS subfolder (only if built)
          cp -r MSK-ACCESS/dist/. _deploy/MSK-ACCESS/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
